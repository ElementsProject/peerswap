name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]  

env:
  SLOW_MACHINE: 1

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        id: setup-go
        with:
          go-version-file: "go.mod"

      - name: Download Go modules
        shell: bash
        if: ${{ steps.setup-go.outputs.cache-hit != 'true' }}
        run: go mod download

      - name: Build
        run: make bins

      - name: Test
        run: make test

  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-vector: [bitcoin-cln, bitcoin-lnd, liquid-cln, liquid-lnd, misc-integration, lwk-cln, lwk-lnd]
      max-parallel: 12
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: nixbuild/nix-quick-install-action@v28
      - name: Cache compiled binaries
        uses: actions/cache@v4
        with:
          path: |
            out/
          key: binaries-${{ runner.os }}-${{ hashFiles('**/*.go', 'go.mod', 'go.sum') }}
          restore-keys: |
            binaries-${{ runner.os }}-

      - name: Cache test blockchain data
        uses: actions/cache@v4
        with:
          path: |
            /tmp/**/regtest
            /tmp/**/bitcoin
            /tmp/**/elements
            /tmp/**/lightning
          key: blockchain-data-${{ runner.os }}-${{ matrix.test-vector }}-${{ hashFiles('test/integration/setup.go') }}
          restore-keys: |
            blockchain-data-${{ runner.os }}-${{ matrix.test-vector }}-
            blockchain-data-${{ runner.os }}-
        continue-on-error: true

      - name: Restore and cache Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          # restore and save a cache using this key
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # collect garbage until Nix store size (in bytes) is at most this number
          # before trying to save a new cache
          gc-max-store-size-linux: 5G
          # use smaller chunk size for better reliability
          upload-chunk-size: 67108864
          # reduce purging for stability
          purge: false
        continue-on-error: true
          
      - name: Build test binaries
        run: nix-shell --run "make test-bins"
      - run: nix-shell --run "make test-${{matrix.test-vector}}"